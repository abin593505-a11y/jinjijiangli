<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>晋升荣耀·智能奖励｜三语话术 (无空行版) 差价+活动奖励+现金代码+幸运抽奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef7ef 0%, #d4e8dc 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .prestige-card {
            max-width: 1350px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(6px);
            border-radius: 3.5rem;
            box-shadow: 0 30px 50px rgba(20, 65, 35, 0.25);
            padding: 2rem 2rem;
            border: 2px solid rgba(200, 235, 210, 0.8);
            transition: all 0.2s;
        }

        h1 {
            font-size: 2.1rem;
            font-weight: 800;
            color: #135a3c;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 0.5rem;
        }

        h1 small {
            background: #fef0cd;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.2rem 1.2rem;
            border-radius: 60px;
            color: #b36b1a;
        }

        .subhead {
            font-size: 0.95rem;
            color: #2b7a57;
            background: #e9f8f0;
            padding: 0.5rem 1.8rem;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 1.8rem;
            border-left: 5px solid #f2c94c;
        }

        .level-zone {
            background: #e2f1e8;
            border-radius: 4rem;
            padding: 1.4rem 1.6rem;
            margin-bottom: 1.5rem;
            border: 2px solid #c4e0d0;
        }

        .level-pair {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }

        .level-group {
            text-align: center;
        }

        .level-group span.label {
            font-weight: 700;
            background: white;
            padding: 0.2rem 1.6rem;
            border-radius: 60px;
            font-size: 0.85rem;
            color: #1c6242;
            display: inline-block;
            margin-bottom: 10px;
        }

        .level-btns {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .level-btns button {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            color: #1f6044;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #bcdfcc;
            min-width: 65px;
        }

        .level-btns button.active {
            background: #1e4b3a;
            color: white;
            border-color: #fbe3a0;
            box-shadow: 0 8px 15px -6px #1e5b43;
        }

        .arrow-emoj {
            font-size: 2.2rem;
            color: #6d9f83;
            font-weight: 500;
        }

        .bonus-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            background: #fafdf3;
            border-radius: 70px;
            padding: 0.6rem 1.8rem;
            margin-bottom: 1.3rem;
            border: 2px solid #e1efda;
        }

        .bonus-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            background: rgba(235, 248, 235, 0.7);
            padding: 0.4rem 1rem;
            border-radius: 70px;
        }

        .bonus-item {
            background: white;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }

        .bonus-item label {
            font-weight: 700;
            color: #226e4a;
            background: #f2fae9;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .bonus-item input {
            width: 90px;
            padding: 6px 10px;
            border-radius: 60px;
            border: 2px solid #cde2d3;
            font-weight: 600;
            text-align: center;
            font-size: 0.9rem;
        }

        .calc-hint {
            font-size: 0.7rem;
            background: #fef7e0;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #9b741f;
        }

        .copy-main-btn {
            background: #1d5a41;
            border: none;
            padding: 10px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.1s;
            box-shadow: 0 6px 14px rgba(20, 70, 30, 0.25);
        }

        .copy-main-btn:active {
            transform: scale(0.97);
        }

        .feature-flags {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #fff8ea;
            border-radius: 80px;
            padding: 0.6rem 1.8rem;
            margin-bottom: 1.3rem;
            border: 2px solid #ffe1a0;
        }

        .flag-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 0.3rem 1.3rem;
            border-radius: 60px;
            font-weight: 700;
            color: #b9791a;
            cursor: pointer;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }

        .flag-item input {
            width: 19px;
            height: 19px;
            accent-color: #ca9622;
            cursor: pointer;
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        .lang-group {
            background: #e3f1e9;
            padding: 0.25rem;
            border-radius: 60px;
            display: flex;
            gap: 6px;
        }

        .lang-group button {
            background: white;
            border: none;
            padding: 6px 28px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
            color: #226e4a;
            font-size: 0.85rem;
        }

        .lang-group button.active {
            background: #226e4a;
            color: white;
        }

        .speech-card {
            background: #ffffff;
            border-radius: 2.5rem;
            padding: 1.8rem 2rem;
            box-shadow: 0 18px 30px -10px rgba(0, 0, 0, 0.08);
            border: 2px solid #d9f0e2;
            margin: 1rem 0 1.5rem;
        }

        .speech-title {
            font-size: 1.7rem;
            font-weight: 800;
            line-height: 1.3;
            color: #0c4732;
            margin-bottom: 1rem;
        }

        .speech-title span.hl {
            background: #fef1bf;
            padding: 0 10px;
            border-radius: 60px;
            display: inline-block;
        }

        .refund-badge {
            background: #f3fcf5;
            border-radius: 2rem;
            padding: 0.9rem 1.5rem;
            margin: 0.8rem 0;
            border-left: 7px solid #f3bc5c;
            font-weight: 500;
            line-height: 1.5;
        }

        .income-dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            background: #ebf9f0;
            border-radius: 2rem;
            padding: 1rem 1.8rem;
            margin: 1rem 0;
            justify-content: space-around;
        }

        .income-stat {
            text-align: center;
        }

        .income-stat .label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #407a5d;
        }

        .income-stat .value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1b6e48;
        }

        .ps-message {
            border-top: 2px solid #d1e8db;
            margin-top: 1.2rem;
            padding-top: 0.9rem;
            text-align: center;
            font-style: italic;
            color: #4a7862;
        }

        .mini-table {
            background: #eef5f0;
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            margin-top: 0.5rem;
        }

        .level-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .level-card-mini {
            background: white;
            border-radius: 40px;
            padding: 6px 14px;
            text-align: center;
            min-width: 70px;
            font-weight: 600;
            color: #1c5e41;
            font-size: 0.8rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        button {
            transition: all 0.1s ease;
        }

        @media (max-width: 720px) {
            .prestige-card {
                padding: 1.2rem;
            }
            .speech-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="prestige-card" id="app">
    <h1>✨ 晋升荣耀·智能奖励 <small>差价+活动奖励+现金代码+幸运抽奖</small></h1>
    <div class="subhead">🎯 奖励为0自动隐藏 | 话术内无空行，紧凑展示 | 三语一键复制</div>

    <div class="level-zone">
        <div class="level-pair">
            <div class="level-group">
                <span class="label">⬅️ 从等级</span>
                <div class="level-btns" id="fromGroup">
                    <button data-lvl="R1">R1</button><button data-lvl="R2">R2</button><button data-lvl="R3">R3</button>
                    <button data-lvl="R4">R4</button><button data-lvl="R5">R5</button><button data-lvl="R6">R6</button>
                    <button data-lvl="R7">R7</button><button data-lvl="R8">R8</button><button data-lvl="R9">R9</button>
                </div>
            </div>
            <div class="arrow-emoj">➡️</div>
            <div class="level-group">
                <span class="label">到等级 ➡️</span>
                <div class="level-btns" id="toGroup">
                    <button data-lvl="R1">R1</button><button data-lvl="R2">R2</button><button data-lvl="R3">R3</button>
                    <button data-lvl="R4">R4</button><button data-lvl="R5">R5</button><button data-lvl="R6">R6</button>
                    <button data-lvl="R7">R7</button><button data-lvl="R8">R8</button><button data-lvl="R9">R9</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bonus-panel">
        <div class="bonus-inputs">
            <div class="bonus-item">
                <label>🎉 活动奖励 %</label>
                <input type="number" id="activityPercent" value="3" step="0.5" min="0">
                <span class="calc-hint" id="activityHint">基于差价</span>
            </div>
            <div class="bonus-item">
                <label>🎁 额外奖励 %</label>
                <input type="number" id="extraPercent" value="5" step="0.5" min="0">
                <span class="calc-hint" id="extraHint">基于差价</span>
            </div>
        </div>
        <button class="copy-main-btn" id="copySpeechBtn">📋 复制晋升话术</button>
    </div>

    <div class="feature-flags">
        <label class="flag-item">
            <input type="checkbox" id="cashCodeCheck"> 💵 现金代码已发放
        </label>
        <label class="flag-item">
            <input type="checkbox" id="luckyDrawCheck"> 🎰 幸运抽奖 (最高赢RM5,888+iPhone 17 Pro Max)
        </label>
    </div>

    <div class="lang-bar">
        <div class="lang-group" id="langGroup">
            <button data-lang="cn">🇨🇳 中文</button>
            <button data-lang="en">🇬🇧 English</button>
            <button data-lang="my">🇲🇾 Bahasa Malaysia</button>
        </div>
    </div>

    <div class="speech-card" id="speechCard">
        <div class="speech-title" id="speechTitle">🎊 恭喜您成功从 <span class="hl">R1</span> 晋升至 <span class="hl">R2</span></div>
        <div class="refund-badge" id="refundBlock">
            💰 晋升礼包已到账：<br>
            ✅ 全额退还：R1保障金已原路返还
        </div>
        <div id="extraFeaturesBlock" style="margin: 10px 0 12px 0; font-weight: 500;"></div>
        <div class="income-dashboard" id="incomeBlock">
            <div class="income-stat"><span class="label">每个工作日</span><div class="value" id="dailyIncome">RM 15.00</div></div>
            <div class="income-stat"><span class="label">30个工作日</span><div class="value" id="monthlyIncome">RM 450.00</div></div>
            <div class="income-stat"><span class="label">365个工作日</span><div class="value" id="yearlyIncome">RM 5,475.00</div></div>
        </div>
        <div id="motivationLine" class="ps-message">🐄💪 时间会给出最好的答案，让我们创造更多可能！✨</div>
    </div>

    <div class="mini-table">
        <div style="display: flex; justify-content: space-between; align-items: center;"><span style="font-weight:800;">📊 等级收益参考 (晋升后每日收入)</span></div>
        <div class="level-grid" id="levelQuickGrid"></div>
    </div>
</div>

<script>
    (function(){
        const levelData = {
            'R1': { daily: 5, monthly: 150, yearly: 1825, price: 150 },
            'R2': { daily: 15, monthly: 450, yearly: 5475, price: 450 },
            'R3': { daily: 45, monthly: 1350, yearly: 16425, price: 1350 },
            'R4': { daily: 160, monthly: 4800, yearly: 58400, price: 4480 },
            'R5': { daily: 480, monthly: 14400, yearly: 175200, price: 13440 },
            'R6': { daily: 1200, monthly: 36000, yearly: 438000, price: 32400 },
            'R7': { daily: 2500, monthly: 75000, yearly: 912500, price: 65000 },
            'R8': { daily: 5200, monthly: 156000, yearly: 1898000, price: 130000 },
            'R9': { daily: 10800, monthly: 324000, yearly: 3942000, price: 259200 }
        };

        let fromLevel = 'R1';
        let toLevel = 'R2';
        let currentLang = 'cn';
        let cashEnabled = false;
        let luckyEnabled = false;

        const fromGroup = document.getElementById('fromGroup');
        const toGroup = document.getElementById('toGroup');
        const langBtns = document.querySelectorAll('[data-lang]');
        const activityPercentInput = document.getElementById('activityPercent');
        const extraPercentInput = document.getElementById('extraPercent');
        const cashCheck = document.getElementById('cashCodeCheck');
        const luckyCheck = document.getElementById('luckyDrawCheck');
        const copyBtn = document.getElementById('copySpeechBtn');

        const speechTitleSpan = document.getElementById('speechTitle');
        const refundBlockDiv = document.getElementById('refundBlock');
        const extraFeaturesDiv = document.getElementById('extraFeaturesBlock');
        const dailySpan = document.getElementById('dailyIncome');
        const monthlySpan = document.getElementById('monthlyIncome');
        const yearlySpan = document.getElementById('yearlyIncome');
        const motivationLine = document.getElementById('motivationLine');
        const activityHint = document.getElementById('activityHint');
        const extraHint = document.getElementById('extraHint');

        function getPriceDiff() {
            const fromPrice = levelData[fromLevel]?.price || 0;
            const toPrice = levelData[toLevel]?.price || 0;
            const diff = toPrice - fromPrice;
            return diff > 0 ? diff : 0;
        }

        function getActivityBonus() {
            const percent = parseFloat(activityPercentInput.value) || 0;
            const diff = getPriceDiff();
            return (percent / 100) * diff;
        }

        function getExtraBonus() {
            const percent = parseFloat(extraPercentInput.value) || 0;
            const diff = getPriceDiff();
            return (percent / 100) * diff;
        }

        function getTotalBonus() {
            return getActivityBonus() + getExtraBonus();
        }

        function formatMoneyRM(val) {
            return `RM ${val.toFixed(2)}`;
        }

        function updateHint() {
            const diff = getPriceDiff();
            const diffFixed = diff.toFixed(2);
            const actPer = parseFloat(activityPercentInput.value) || 0;
            const extPer = parseFloat(extraPercentInput.value) || 0;
            if(currentLang === 'cn'){
                activityHint.innerText = `差价 RM${diffFixed} × ${actPer}%`;
                extraHint.innerText = `差价 RM${diffFixed} × ${extPer}%`;
            } else if(currentLang === 'en'){
                activityHint.innerText = `Diff RM${diffFixed} x ${actPer}%`;
                extraHint.innerText = `Diff RM${diffFixed} x ${extPer}%`;
            } else {
                activityHint.innerText = `Beza RM${diffFixed} x ${actPer}%`;
                extraHint.innerText = `Beza RM${diffFixed} x ${extPer}%`;
            }
        }

        // 核心：生成无空行话术 (全部使用 \n 但去除多余空行，这里保证段内换行但段落之间没有空行)
        // 完全删除空行: 最终字符串中不包含两个连续的换行符，每个部分之间直接单换行衔接。
        function generateOptimizedSpeech() {
            const from = fromLevel;
            const to = toLevel;
            const activityBonus = getActivityBonus();
            const extraBonus = getExtraBonus();
            const totalBonus = activityBonus + extraBonus;
            const toData = levelData[to];
            const dailyVal = toData.daily;
            const monthlyVal = toData.monthly;
            const yearlyVal = toData.yearly;
            const cashActive = cashEnabled;
            const luckyActive = luckyEnabled;

            const hasActivity = activityBonus > 0;
            const hasExtra = extraBonus > 0;
            const hasAnyBonus = hasActivity || hasExtra;

            let rewardDetail = '';
            if(currentLang === 'cn'){
                if(hasAnyBonus){
                    let line = `💰 *晋升礼包已到账*：\n✅ *全额退还*：${from}保障金已原路返还`;
                    if(hasActivity) line += `\n✅ *活动奖励*：${formatMoneyRM(activityBonus)}`;
                    if(hasExtra) line += ` + *额外奖励*：${formatMoneyRM(extraBonus)}`;
                    line += `\n🎁 总计 ${formatMoneyRM(totalBonus)} 奖励已存入您的 RS 账户！`;
                    rewardDetail = line;
                } else {
                    rewardDetail = `💰 *晋升礼包已到账*：\n✅ *全额退还*：${from}保障金已原路返还`;
                }
            } 
            else if(currentLang === 'en'){
                if(hasAnyBonus){
                    let line = `💰 *Promotion Gift Credited*:\n✅ *Full Refund*: ${from} deposit returned`;
                    if(hasActivity) line += `\n✅ *Activity Bonus*: ${formatMoneyRM(activityBonus)}`;
                    if(hasExtra) line += ` + *Extra Bonus*: ${formatMoneyRM(extraBonus)}`;
                    line += `\n🎁 Total ${formatMoneyRM(totalBonus)} credited to your RS account!`;
                    rewardDetail = line;
                } else {
                    rewardDetail = `💰 *Promotion Gift Credited*:\n✅ *Full Refund*: ${from} deposit returned`;
                }
            } 
            else {
                if(hasAnyBonus){
                    let line = `💰 *Hadiah Kenaikan Pangkat Dikreditkan*:\n✅ *Bayaran Balik Penuh*: Deposit ${from} dikembalikan`;
                    if(hasActivity) line += `\n✅ *Bonus Aktiviti*: ${formatMoneyRM(activityBonus)}`;
                    if(hasExtra) line += ` + *Bonus Tambahan*: ${formatMoneyRM(extraBonus)}`;
                    line += `\n🎁 Jumlah ${formatMoneyRM(totalBonus)} dimasukkan ke akaun RS anda!`;
                    rewardDetail = line;
                } else {
                    rewardDetail = `💰 *Hadiah Kenaikan Pangkat Dikreditkan*:\n✅ *Bayaran Balik Penuh*: Deposit ${from} dikembalikan`;
                }
            }

            let cashText = '';
            if(cashActive){
                if(currentLang === 'cn') cashText = '*现金代码已发放，请查收* 💪';
                else if(currentLang === 'en') cashText = '*Cash code has been sent, please check* 💪';
                else cashText = '*Kod tunai telah dihantar, sila semak* 💪';
            }

            let luckyText = '';
            if(luckyActive){
                if(currentLang === 'cn') luckyText = '🌟 *幸运抽奖开启*：\n最高赢取 RM5,888 现金 + iPhone 17 Pro Max 📱\n（*请截图分享至 RS 群组，让大家见证您的晋升时刻*）';
                else if(currentLang === 'en') luckyText = '🌟 *Lucky Draw Open*:\nWin up to RM5,888 cash + iPhone 17 Pro Max 📱\n(*Please screenshot and share in RS group to celebrate your promotion*)';
                else luckyText = '🌟 *Cabutan Bertuah Dibuka*:\nMenang sehingga RM5,888 tunai + iPhone 17 Pro Max 📱\n(*Sila tangkap skrin dan kongsi ke kumpulan RS untuk meraikan kenaikan pangkat anda*)';
            }

            let incomeSection = '';
            if(currentLang === 'cn'){
                incomeSection = `💸 *${to} 收益*：\n每个工作日：*${formatMoneyRM(dailyVal)}*\n30个工作日：*${formatMoneyRM(monthlyVal)}*\n365个工作日：*${formatMoneyRM(yearlyVal)}*`;
            } else if(currentLang === 'en'){
                incomeSection = `💸 *${to} Earnings*:\nPer working day: *${formatMoneyRM(dailyVal)}*\n30 working days: *${formatMoneyRM(monthlyVal)}*\n365 working days: *${formatMoneyRM(yearlyVal)}*`;
            } else {
                incomeSection = `💸 *Pendapatan ${to}*:\nSetiap hari bekerja: *${formatMoneyRM(dailyVal)}*\n30 hari bekerja: *${formatMoneyRM(monthlyVal)}*\n365 hari bekerja: *${formatMoneyRM(yearlyVal)}*`;
            }

            let closingLine = '';
            if(currentLang === 'cn') closingLine = '🐄💪 时间会给出最好的答案，让我们创造更多可能！✨';
            else if(currentLang === 'en') closingLine = '🐄💪 Time will give the best answer, let’s create more possibilities! ✨';
            else closingLine = '🐄💪 Masa akan memberikan jawapan terbaik, mari kita cipta lebih banyak kemungkinan! ✨';

            let titleRaw = '';
            if(currentLang === 'cn') titleRaw = `🎊 恭喜您成功从 *${from}* 晋升至 *${to}*\n您的财富增长之路，正式迈入新阶段！📈`;
            else if(currentLang === 'en') titleRaw = `🎊 Congratulations on your promotion from *${from}* to *${to}*\nYour wealth growth journey has officially entered a new stage! 📈`;
            else titleRaw = `🎊 Tahniah atas kenaikan pangkat anda dari *${from}* ke *${to}*\nPerjalanan pertumbuhan kekayaan anda memasuki peringkat baharu! 📈`;

            // 构建无空行版本：按照顺序直接拼接，各部分之间只有一个 \n（而不是两个）
            let parts = [titleRaw, rewardDetail];
            if(cashText) parts.push(cashText);
            if(luckyText) parts.push(luckyText);
            parts.push(incomeSection);
            parts.push(closingLine);
            
            // 用单换行连接，确保没有多余空行（连续两个\n的情况不会出现）
            let fullSpeech = parts.join('\n');
            // 额外清理可能因为部分空串导致的多余换行 (安全)
            fullSpeech = fullSpeech.replace(/\n{2,}/g, '\n');
            return fullSpeech;
        }

        function updatePreviewUI() {
            const from = fromLevel;
            const to = toLevel;
            const activityBonus = getActivityBonus();
            const extraBonus = getExtraBonus();
            const total = activityBonus + extraBonus;
            const toData = levelData[to];
            const hasAct = activityBonus > 0;
            const hasExt = extraBonus > 0;
            const hasAny = hasAct || hasExt;

            if(currentLang === 'cn'){
                speechTitleSpan.innerHTML = `🎊 恭喜您成功从 <span class="hl">${from}</span> 晋升至 <span class="hl">${to}</span><br>您的财富增长之路，正式迈入新阶段！📈`;
            } else if(currentLang === 'en'){
                speechTitleSpan.innerHTML = `🎊 Congratulations on your promotion from <span class="hl">${from}</span> to <span class="hl">${to}</span><br>Your wealth growth journey has entered a new stage! 📈`;
            } else {
                speechTitleSpan.innerHTML = `🎊 Tahniah atas kenaikan pangkat anda dari <span class="hl">${from}</span> ke <span class="hl">${to}</span><br>Perjalanan pertumbuhan kekayaan anda memasuki peringkat baharu! 📈`;
            }

            let rewardHtml = '';
            if(currentLang === 'cn'){
                if(hasAny){
                    let base = `💰 <strong>晋升礼包已到账</strong>：<br>✅ <strong>全额退还</strong>：${from}保障金已原路返还`;
                    if(hasAct) base += `<br>✅ <strong>活动奖励</strong>：${formatMoneyRM(activityBonus)}`;
                    if(hasExt) base += ` + <strong>额外奖励</strong>：${formatMoneyRM(extraBonus)}`;
                    base += `<br>🎁 总计 ${formatMoneyRM(total)} 奖励已存入您的 RS 账户！`;
                    rewardHtml = base;
                } else {
                    rewardHtml = `💰 <strong>晋升礼包已到账</strong>：<br>✅ <strong>全额退还</strong>：${from}保障金已原路返还`;
                }
            } 
            else if(currentLang === 'en'){
                if(hasAny){
                    let base = `💰 <strong>Promotion Gift Credited</strong>:<br>✅ <strong>Full Refund</strong>: ${from} deposit returned`;
                    if(hasAct) base += `<br>✅ <strong>Activity Bonus</strong>: ${formatMoneyRM(activityBonus)}`;
                    if(hasExt) base += ` + <strong>Extra Bonus</strong>: ${formatMoneyRM(extraBonus)}`;
                    base += `<br>🎁 Total ${formatMoneyRM(total)} credited to your RS account!`;
                    rewardHtml = base;
                } else {
                    rewardHtml = `💰 <strong>Promotion Gift Credited</strong>:<br>✅ <strong>Full Refund</strong>: ${from} deposit returned`;
                }
            } 
            else {
                if(hasAny){
                    let base = `💰 <strong>Hadiah Kenaikan Pangkat Dikreditkan</strong>:<br>✅ <strong>Bayaran Balik Penuh</strong>: Deposit ${from} dikembalikan`;
                    if(hasAct) base += `<br>✅ <strong>Bonus Aktiviti</strong>: ${formatMoneyRM(activityBonus)}`;
                    if(hasExt) base += ` + <strong>Bonus Tambahan</strong>: ${formatMoneyRM(extraBonus)}`;
                    base += `<br>🎁 Jumlah ${formatMoneyRM(total)} dimasukkan ke akaun RS anda!`;
                    rewardHtml = base;
                } else {
                    rewardHtml = `💰 <strong>Hadiah Kenaikan Pangkat Dikreditkan</strong>:<br>✅ <strong>Bayaran Balik Penuh</strong>: Deposit ${from} dikembalikan`;
                }
            }
            refundBlockDiv.innerHTML = rewardHtml;

            let extraHtml = '';
            if(cashEnabled){
                if(currentLang === 'cn') extraHtml += '<div style="background:#FDF6E3; border-radius: 60px; padding: 8px 16px; margin: 8px 0;">💵 *现金代码已发放，请查收* 💪</div>';
                else if(currentLang === 'en') extraHtml += '<div style="background:#FDF6E3; border-radius: 60px; padding: 8px 16px; margin: 8px 0;">💵 *Cash code has been sent, please check* 💪</div>';
                else extraHtml += '<div style="background:#FDF6E3; border-radius: 60px; padding: 8px 16px; margin: 8px 0;">💵 *Kod tunai telah dihantar, sila semak* 💪</div>';
            }
            if(luckyEnabled){
                if(currentLang === 'cn') extraHtml += '<div style="background:#FFF0D6; border-radius: 60px; padding: 10px 16px; margin: 10px 0;">🌟 <strong>幸运抽奖开启</strong>：<br>最高赢取 RM5,888 现金 + iPhone 17 Pro Max 📱<br>（*请截图分享至 RS 群组，让大家见证您的晋升时刻*）</div>';
                else if(currentLang === 'en') extraHtml += '<div style="background:#FFF0D6; border-radius: 60px; padding: 10px 16px; margin: 10px 0;">🌟 <strong>Lucky Draw Open</strong>:<br>Win up to RM5,888 cash + iPhone 17 Pro Max 📱<br>(*Please screenshot and share in RS group to celebrate*)</div>';
                else extraHtml += '<div style="background:#FFF0D6; border-radius: 60px; padding: 10px 16px; margin: 10px 0;">🌟 <strong>Cabutan Bertuah Dibuka</strong>:<br>Menang sehingga RM5,888 tunai + iPhone 17 Pro Max 📱<br>(*Sila tangkap skrin dan kongsi ke kumpulan RS*)</div>';
            }
            extraFeaturesDiv.innerHTML = extraHtml;

            dailySpan.innerText = formatMoneyRM(toData.daily);
            monthlySpan.innerText = formatMoneyRM(toData.monthly);
            yearlySpan.innerText = formatMoneyRM(toData.yearly);
            
            if(currentLang === 'cn') motivationLine.innerHTML = '🐄💪 时间会给出最好的答案，让我们创造更多可能！✨';
            else if(currentLang === 'en') motivationLine.innerHTML = '🐄💪 Time will give the best answer, let’s create more possibilities! ✨';
            else motivationLine.innerHTML = '🐄💪 Masa akan memberikan jawapan terbaik, mari kita cipta lebih banyak kemungkinan! ✨';
        }

        function refreshAll() {
            updateHint();
            updatePreviewUI();
            syncActiveClasses();
        }

        function syncActiveClasses() {
            document.querySelectorAll('#fromGroup button').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lvl') === fromLevel);
            });
            document.querySelectorAll('#toGroup button').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lvl') === toLevel);
            });
            document.querySelectorAll('[data-lang]').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === currentLang);
            });
        }

        function handleFromClick(lvl){
            const fromNum = parseInt(lvl.replace('R',''));
            const toNum = parseInt(toLevel.replace('R',''));
            if(fromNum >= toNum){
                let newToNum = fromNum + 1;
                if(newToNum > 9) newToNum = 9;
                toLevel = `R${newToNum}`;
            }
            fromLevel = lvl;
            refreshAll();
        }

        function handleToClick(lvl){
            const fromNum = parseInt(fromLevel.replace('R',''));
            const toNum = parseInt(lvl.replace('R',''));
            if(toNum <= fromNum){
                let newTo = fromNum + 1;
                if(newTo > 9) newTo = 9;
                toLevel = `R${newTo}`;
            } else {
                toLevel = lvl;
            }
            refreshAll();
        }

        fromGroup.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON' && e.target.dataset.lvl){
                handleFromClick(e.target.dataset.lvl);
            }
        });
        toGroup.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON' && e.target.dataset.lvl){
                handleToClick(e.target.dataset.lvl);
            }
        });
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.dataset.lang;
                refreshAll();
            });
        });
        activityPercentInput.addEventListener('input', refreshAll);
        extraPercentInput.addEventListener('input', refreshAll);
        cashCheck.addEventListener('change', (e) => { cashEnabled = e.target.checked; refreshAll(); });
        luckyCheck.addEventListener('change', (e) => { luckyEnabled = e.target.checked; refreshAll(); });
        
        copyBtn.addEventListener('click', () => {
            const finalText = generateOptimizedSpeech();
            navigator.clipboard.writeText(finalText).then(() => {
                const original = copyBtn.innerText;
                copyBtn.innerText = '✅ 已复制！';
                setTimeout(() => { copyBtn.innerText = original; }, 1500);
            }).catch(() => alert('复制失败，可手动选取'));
        });
        
        function renderLevelGrid() {
            const grid = document.getElementById('levelQuickGrid');
            const levels = ['R1','R2','R3','R4','R5','R6','R7','R8','R9'];
            grid.innerHTML = levels.map(l => `<div class="level-card-mini"><strong>${l}</strong><br>RM ${levelData[l].daily}/日</div>`).join('');
        }
        renderLevelGrid();
        refreshAll();
    })();
</script>
</body>
</html>
